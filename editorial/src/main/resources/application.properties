
# ── Application ────────────────────────────────────────────────────────────────
spring.application.name=mediahub
server.port=8083
spring.main.allow-bean-definition-overriding=true

# ── Database (all modules share one DB) ───────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/mediahub?zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.naming.physical-strategy=com.mediahub.iam.config.TableSnakeColumnCamelStrategy
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT (IAM — protects all modules) ──────────────────────────────────────────
jwt.secret=mediahub_iam_secret_key_2025_must_be_32_chars_min
jwt.expiry=3600000

# ── Admin seed ─────────────────────────────────────────────────────────────────
app.admin.email=${ADMIN_EMAIL:admin@mediahub.com}
app.admin.password=${ADMIN_PASSWORD:$2b$12$adminHash001}
app.admin.name=${ADMIN_NAME:System Admin}
app.admin.phone=${ADMIN_PHONE:+91-9000000001}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.mediahub=DEBUG
